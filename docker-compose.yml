services:
  frontend:
    image: eunjeong0911/mindcare-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_DJANGO_HOST: ${REACT_APP_DJANGO_HOST:-localhost}
        REACT_APP_DJANGO_PORT: ${REACT_APP_DJANGO_PORT:-8000}
    container_name: mindcare-frontend
    depends_on:
      - backend
    ports:
      - "${REACT_PORT:-3000}:80"
    networks:
      - SKN4th_network

  backend:
    image: eunjeong0911/mindcare-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mindcare-backend
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    networks:
      - SKN4th_network

  # PostgreSQL 데이터베이스
  postgres:
    image: pgvector/pgvector:pg18
    container_name: SKN18-4th
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8 --auth-host=scram-sha-256"
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - SKN4th_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

# 볼륨 정의
volumes:
  postgres_data:
    driver: local

# 네트워크 정의
networks:
  SKN4th_network:
    driver: bridge
