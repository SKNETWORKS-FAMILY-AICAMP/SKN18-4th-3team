{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
{% endblock %}

{% block content %}
<div class="home-content">
    <h1 class="main-title">MAIN</h1>
    {% if user.is_authenticated %}
        <a href="{% url 'chatbot:chat' %}" class="start-btn">시작하기</a>
    {% else %}
        <a href="{% url 'users:login' %}" class="start-btn">시작하기</a>
    {% endif %}
</div>
{% endblock %}
